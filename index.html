<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ERD Canvas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <div id="toolbar">
    <button class="tb-btn" id="btn-add-table">+ Table</button>
    <button class="tb-btn" id="btn-connect">&#x1F517; Connect</button>
    <div class="tb-sep"></div>
    <button class="tb-btn danger" id="btn-delete">&#x1F5D1; Delete</button>
    <button class="tb-btn danger" id="btn-clear">Clear All</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-fit">Fit View</button>
    <button class="tb-btn" id="btn-zoom-in">&#xFF0B; Zoom</button>
    <button class="tb-btn" id="btn-zoom-out">&#xFF0D; Zoom</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-sql">SQL &#x2197;</button>
    <button class="tb-btn" id="btn-save" style="color:#4a9;border-color:#4a9">&#x1F4BE; Save</button>
    <button class="tb-btn" id="btn-load" style="color:#4a9;border-color:#4a9">&#x1F4C2; Load</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-help" style="color:#a78bfa;border-color:#6366f1;font-weight:600">&#x2753; مساعدة</button>
  </div>
  <div id="main">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="hint">اسحب الجداول &#x25CF; Connect لتوصيل &#x25CF; اضغط على جدول للتعديل</div>
    </div>
    <div id="side-panel">
      <div class="sp-title">Properties</div>
      <div id="sp-content" style="color:#666;font-size:12px">اضغط على عنصر لتعديله</div>
    </div>
  </div>
</div>

<!-- Table Dialog -->
<dialog class="custom-dialog" id="table-dialog">
  <div class="dialog-header">
    <h3 id="dlg-title">إنشاء جدول جديد</h3>
    <button class="dlg-close" id="dlg-cancel">&#x2715;</button>
  </div>
  <div class="dialog-body">
    <div class="dlg-field">
      <label>اسم الجدول</label>
      <input type="text" id="dlg-table-name" placeholder="مثال: users" autocomplete="off">
    </div>
    <div>
      <div class="dlg-cols-label">
        <span>الأعمدة</span>
        <button class="dlg-cols-add" id="dlg-add-col">+ عمود</button>
      </div>
      <div style="height:8px"></div>
      <div id="dlg-columns"></div>
      <div id="dlg-empty" class="dlg-empty" style="display:none">لا يوجد أعمدة — اضغط "+ عمود" لإضافة</div>
    </div>
  </div>
  <div class="dialog-footer">
    <button class="btn-secondary" id="dlg-cancel2">إلغاء</button>
    <button class="btn-primary" id="dlg-submit">إنشاء الجدول</button>
  </div>
</dialog>

<!-- Help Tooltip Overlay -->
<div id="help-overlay">
  <div id="help-backdrop"></div>
  <div id="help-ring"></div>
  <div id="help-arrow" data-dir="up"></div>
  <div id="help-box">
    <div id="help-box-header">
      <span id="help-step-badge">خطوة 1 / 5</span>
      <button id="help-box-close">&#x2715;</button>
    </div>
    <div id="help-text"></div>
    <div id="help-actions">
      <span id="help-progress"></span>
      <div id="help-actions-btns">
        <button class="help-btn" id="help-skip">تخطي</button>
        <button class="help-btn primary" id="help-next">التالي &#x2192;</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
